<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide-In Panel Version</title>
  <link rel="stylesheet" href="modified_ponder.css">
</head>
<body>

  <div class="curtain">
    <div class="curtain__wrapper">

      <!-- Checkbox starts unchecked
           So background is visible first -->
      <input type="checkbox" aria-label="Toggle Panel">

      <!-- Background Content (visible initially) -->
      <div class="curtain__content">
        <h2>Welcome 👋</h2>
        <p>Click anywhere to slide the panel in.</p>
      </div>

      <!-- Single sliding panel (left only) -->
      <div class="curtain__panel curtain__panel--left">
        <h1>Hello there!</h1>
      </div>

    </div>
  </div>

</body>
</html>
